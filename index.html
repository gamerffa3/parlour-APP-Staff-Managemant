<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f4f6;
padding:15px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

h1,h2,h3{
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:12px;
font-size:15px;
}

button{
background:#2563eb;
color:white;
border:none;
font-weight:bold;
}

.staff-card{
background:#f9fafb;
padding:15px;
border-radius:16px;
margin-top:15px;
border-left:5px solid #2563eb;
}

.code{
font-size:34px;
font-weight:bold;
text-align:center;
margin:10px 0;
color:#16a34a;
}

.red{
background:#dc2626;
}

.green{
background:#16a34a;
}

.time{
font-size:18px;
font-weight:bold;
color:#111827;
}

</html>
