<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Admin App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f4f6;
padding-bottom:100px;
}

.header{
background:#2563eb;
color:white;
padding:20px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
position:sticky;
top:0;
z-index:100;
}

.header h1{
font-size:24px;
}

.live-time{
margin-top:10px;
font-size:14px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,select,button{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
margin-top:10px;
font-size:15px;
}

button{
background:#2563eb;
color:white;
border:none;
font-weight:bold;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

.stats{
display:grid;
</html>
