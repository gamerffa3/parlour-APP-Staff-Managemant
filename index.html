# index.html (Admin App)

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:#f3f4f6;
padding:15px;
}
.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}
input,select,button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;
border:1px solid #ccc;
}
button{
background:#2563eb;
color:white;
border:none;
font-weight:bold;
}
.staff{
background:#f9fafb;
padding:15px;
border-radius:15px;
margin-top:15px;
}
.code{
font-size:30px;
font-weight:bold;
color:#16a34a;
margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>Salon Admin Panel</h2>
<p id="liveTime"></p>
<button onclick="setSalonLocation()">Set Salon Location</button>
<p id="locationStatus"></p>
</div>

<div class="card">
<h2>Add Staff</h2>
<input type="text" id="name" placeholder="Staff Name">
<input type="number" id="salary" placeholder="Monthly Salary">
<input type="text" id="time" placeholder="Example: 9:00">
<select id="ampm">
<option>AM</option>
<option>PM</option>
</select>
<select id="holiday">
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
</select>
<button onclick="addStaff()">Add Staff</button>
</div>

<div class="card">
<h2>All Staff</h2>
<div id="staffList"></div>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBwkeBZilmVGP_kwlrgq9EknQkBKJd4EjY",
authDomain: "staff-managemant-db65c.firebaseapp.com",
projectId: "staff-managemant-db65c",
storageBucket: "staff-managemant-db65c.firebasestorage.app",
messagingSenderId: "46075713632",
appId: "1:46075713632:web:8af66a96598fae1c5b0b05"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

setInterval(()=>{
document.getElementById('liveTime').innerHTML =
new Date().toLocaleString();
},1000);

async function setSalonLocation(){

if(!navigator.geolocation){
alert('GPS not supported');
return;
}

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

await db.collection('settings').doc('salon').set({
lat:lat,
lng:lng
});

document.getElementById('locationStatus').innerHTML =
'Salon Location Saved';

},()=>{
alert('Please Turn On Location');
});

}

async function addStaff(){

const name = document.getElementById('name').value;
const salary = document.getElementById('salary').value;
const time = document.getElementById('time').value;
const ampm = document.getElementById('ampm').value;
const holiday = document.getElementById('holiday').value;

if(name==''||salary==''||time==''){
alert('Fill all fields');
return;
}

await db.collection('staff').add({
name,
salary:parseInt(salary),
time,
ampm,
holiday,
finalSalary:parseInt(salary),
bonus:0,
penalty:0,
code:'',
codeExpiry:0,
status:'Not Marked',
lastTime:'-'
});

alert('Staff Added');

}

function generateCode(){
return Math.floor(1000 + Math.random()*9000).toString();
}

async function createAttendanceCode(id){

const code = generateCode();
const expiry = Date.now() + 30000;

await db.collection('staff').doc(id).update({
code:code,
codeExpiry:expiry
});

alert('Code: '+code);

}

async function deleteStaff(id){
await db.collection('staff').doc(id).delete();
}


db.collection('staff').onSnapshot((snapshot)=>{

const box = document.getElementById('staffList');
box.innerHTML='';

snapshot.forEach((doc)=>{

const s = doc.data();

box.innerHTML += `
<div class="staff">
<h3>${s.name}</h3>
<p>Salary: ₹${s.salary}</p>
<p>Final Salary: ₹${s.finalSalary}</p>
<p>Shift: ${s.time} ${s.ampm}</p>
<p>Holiday: ${s.holiday}</p>
<p>Status: ${s.status}</p>
<p>Last Time: ${s.lastTime}</p>
<p>Bonus: ₹${s.bonus}</p>
<p>Penalty: ₹${s.penalty}</p>
<div class="code">${s.code}</div>
<button onclick="createAttendanceCode('${doc.id}')">Generate Code</button>
<button onclick="deleteStaff('${doc.id}')">Delete Staff</button>
</div>
`;

});

});

</script>
</body>
</html>
```

# staff.html (Staff App)

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:#f3f4f6;
padding:15px;
}
.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}
input,button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;
border:1px solid #ccc;
}
button{
background:#16a34a;
color:white;
border:none;
font-weight:bold;
}
.staff{
background:#f9fafb;
padding:15px;
border-radius:15px;
margin-top:15px;
}
</style>
</head>
<body>

<div class="card">
<h2>Staff Attendance</h2>
<p>Select your name and enter admin code.</p>
</div>

<div id="staffList"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBwkeBZilmVGP_kwlrgq9EknQkBKJd4EjY",
authDomain: "staff-managemant-db65c.firebaseapp.com",
projectId: "staff-managemant-db65c",
storageBucket: "staff-managemant-db65c.firebasestorage.app",
messagingSenderId: "46075713632",
appId: "1:46075713632:web:8af66a96598fae1c5b0b05"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function distance(lat1, lon1, lat2, lon2){
const R = 6371e3;
const p1 = lat1 * Math.PI/180;
const p2 = lat2 * Math.PI/180;
const dp = (lat2-lat1) * Math.PI/180;
const dl = (lon2-lon1) * Math.PI/180;
const a = Math.sin(dp/2)*Math.sin(dp/2)+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

async function verifyAttendance(id){

const enteredCode = document.getElementById('code-'+id).value;

if(!navigator.geolocation){
alert('GPS not supported');
return;
}

navigator.geolocation.getCurrentPosition(async(pos)=>{

const userLat = pos.coords.latitude;
const userLng = pos.coords.longitude;

const salonDoc = await db.collection('settings').doc('salon').get();
const salon = salonDoc.data();

const meter = distance(userLat,userLng,salon.lat,salon.lng);

if(meter > 50){
alert('You are not inside salon');
return;
}

const staffDoc = await db.collection('staff').doc(id).get();
const staff = staffDoc.data();

if(Date.now() > staff.codeExpiry){
alert('Code Expired');
return;
}

if(enteredCode !== staff.code){
alert('Wrong Code');
return;
}

const now = new Date();

let status = 'On Time';
let bonus = 0;
let penalty = 0;

let currentHour = now.getHours();

let shift = staff.time.split(':');
let shiftHour = parseInt(shift[0]);

if(staff.ampm==='PM' && shiftHour<12){
shiftHour += 12;
}

if(currentHour < shiftHour){
status='Early';
bonus=20;
}

if(currentHour > shiftHour){
status='Late';
penalty=20;
}

const finalSalary =
staff.finalSalary + bonus - penalty;

await db.collection('attendance').add({
name:staff.name,
time:now.toLocaleString(),
status,
bonus,
penalty
});

await db.collection('staff').doc(id).update({
status,
bonus:(staff.bonus||0)+bonus,
penalty:(staff.penalty||0)+penalty,
finalSalary,
lastTime:now.toLocaleString(),
code:'',
codeExpiry:0
});

alert('Attendance Verified');

},()=>{
alert('Please Turn On Location');
});

}


db.collection('staff').onSnapshot((snapshot)=>{

const box = document.getElementById('staffList');
box.innerHTML='';

snapshot.forEach((doc)=>{

const s = doc.data();

box.innerHTML += `
<div class="staff">
<h3>${s.name}</h3>
<p>Salary: ₹${s.finalSalary}</p>
<p>Status: ${s.status}</p>
<input type="number" id="code-${doc.id}" placeholder="Enter 4 Digit Code">
<button onclick="verifyAttendance('${doc.id}')">Verify Attendance</button>
</div>
`;

});

});

</script>
</body>
</html>
```
