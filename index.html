<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon Admin Panel</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f3f4f6;
      padding:15px;
    }

    .container{
      max-width:500px;
      margin:auto;
      padding-bottom:80px;
    }

    .header{
      background:linear-gradient(135deg,#111827,#1f2937);
      color:white;
      padding:25px;
      border-radius:22px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .header h1{
      font-size:28px;
      margin-bottom:5px;
    }

    .header p{
      color:#d1d5db;
      font-size:14px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:22px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .card h2{
      margin-bottom:15px;
      color:#111827;
    }

    input,select{
      width:100%;
      padding:15px;
      border-radius:14px;
      border:1px solid #d1d5db;
      margin-bottom:12px;
      background:#f9fafb;
      font-size:15px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .add-btn{
      background:#2563eb;
      color:white;
    }

    .come-btn{
      background:#16a34a;
      color:white;
      margin-top:12px;
    }

    .staff-list{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .staff-card{
      background:#f9fafb;
      padding:16px;
      border-radius:18px;
      border-left:6px solid #2563eb;
    }

    .staff-card h3{
      margin-bottom:8px;
      color:#111827;
    }

    .staff-card p{
      margin-bottom:5px;
      color:#4b5563;
      font-size:14px;
    }

    .salary-box{
      margin-top:12px;
      background:#ecfdf5;
      padding:12px;
      border-radius:12px;
      color:#065f46;
      font-weight:bold;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="header">

    <h1>Salon Admin</h1>

    <p>Staff Attendance & Salary Management</p>

  </div>

  <!-- ADD STAFF -->

  <div class="card">

    <h2>Add Staff</h2>

    <input type="text" id="name" placeholder="Staff Name">

    <input type="number" id="salary" placeholder="Monthly Salary">

    <input type="time" id="time">

    <select id="ampm">
      <option value="AM">AM</option>
      <option value="PM">PM</option>
    </select>

    <select id="holiday">
      <option value="Sunday">Sunday Holiday</option>
      <option value="Monday">Monday Holiday</option>
      <option value="Tuesday">Tuesday Holiday</option>
      <option value="Wednesday">Wednesday Holiday</option>
      <option value="Thursday">Thursday Holiday</option>
      <option value="Friday">Friday Holiday</option>
      <option value="Saturday">Saturday Holiday</option>
    </select>

    <button class="add-btn" onclick="addStaff()">
      Add Staff
    </button>

  </div>

  <!-- STAFF LIST -->

  <div class="card">

    <h2>All Staff</h2>

    <div class="staff-list" id="staffList"></div>

  </div>

</div>

<script>

  // FIREBASE CONFIG

  const firebaseConfig = {

    apiKey: "AIzaSyBwkeBZilmVGP_kwlrgq9EknQkBKJd4EjY",

    authDomain: "staff-managemant-db65c.firebaseapp.com",

    projectId: "staff-managemant-db65c",

    storageBucket: "staff-managemant-db65c.firebasestorage.app",

    messagingSenderId: "46075713632",

    appId: "1:46075713632:web:8af66a96598fae1c5b0b05",

    measurementId: "G-R4XZ85FR3M"

  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();

  // ADD STAFF

  function addStaff(){

    const name = document.getElementById("name").value;

    const salary = document.getElementById("salary").value;

    const time = document.getElementById("time").value;

    const ampm = document.getElementById("ampm").value;

    const holiday = document.getElementById("holiday").value;

    if(!name || !salary || !time){

      alert("Please fill all fields");

      return;

    }

    db.collection("staff").add({

      name:name,

      salary:parseInt(salary),

      shiftTime:time,

      ampm:ampm,

      holiday:holiday,

      totalBonus:0,

      totalPenalty:0,

      finalSalary:parseInt(salary),

      createdAt:
      firebase.firestore.FieldValue.serverTimestamp()

    })

    .then(()=>{

      alert("Staff Added Successfully");

      document.getElementById("name").value = "";

      document.getElementById("salary").value = "";

      document.getElementById("time").value = "";

    })

  }

  // COME IN SALON

  async function comeInSalon(staffId){

    const now = new Date();

    const today = now.toLocaleDateString();

    // CHECK ATTENDANCE

    const attendanceRef = await db
    .collection("attendance")
    .where("staffId","==",staffId)
    .where("date","==",today)
    .get();

    if(!attendanceRef.empty){

      alert("Attendance Already Done");

      return;

    }

    // GET STAFF DATA

    const staffDoc = await db
    .collection("staff")
    .doc(staffId)
    .get();

    const staff = staffDoc.data();

    let currentHour = now.getHours();

    let currentMinute = now.getMinutes();

    // SHIFT TIME

    let shift = staff.shiftTime.split(":");

    let shiftHour = parseInt(shift[0]);

    let shiftMinute = parseInt(shift[1]);

    if(staff.ampm === "PM" && shiftHour < 12){

      shiftHour += 12;

    }

    // BONUS & PENALTY

    let status = "On Time";

    let bonus = 0;

    let penalty = 0;

    // EARLY BONUS

    if(currentHour < shiftHour){

      status = "Early";

      bonus = 20;

    }

    // LATE PENALTY

    if(
      currentHour > shiftHour ||
      (
        currentHour === shiftHour &&
        currentMinute > shiftMinute + 10
      )
    ){

      status = "Late";

      penalty = 20;

    }

    // FINAL SALARY

    let finalSalary =
      parseInt(staff.finalSalary || staff.salary)
      + bonus
      - penalty;

    // SAVE ATTENDANCE

    await db.collection("attendance").add({

      staffId:staffId,

      staffName:staff.name,

      status:status,

      bonus:bonus,

      penalty:penalty,

      date:today,

      checkIn:
      firebase.firestore.FieldValue.serverTimestamp()

    });

    // UPDATE STAFF

    await db.collection("staff")
    .doc(staffId)
    .update({

      totalBonus:
      (staff.totalBonus || 0) + bonus,

      totalPenalty:
      (staff.totalPenalty || 0) + penalty,

      finalSalary:finalSalary

    });

    alert(
      "Attendance Success\n\n" +
      "Status: " + status
    );

  }

  // REALTIME STAFF LOAD

  db.collection("staff").onSnapshot((snapshot)=>{

    const staffList =
    document.getElementById("staffList");

    staffList.innerHTML = "";

    snapshot.forEach((doc)=>{

      const staff = doc.data();

      staffList.innerHTML += `

        <div class="staff-card">

          <h3>${staff.name}</h3>

          <p>
            <b>Monthly Salary:</b>
            ₹${staff.salary}
          </p>

          <p>
            <b>Shift Time:</b>
            ${staff.shiftTime} ${staff.ampm}
          </p>

          <p>
            <b>Holiday:</b>
            ${staff.holiday}
          </p>

          <div class="salary-box">

            Final Salary:
            ₹${staff.finalSalary}

          </div>

          <button
            class="come-btn"
            onclick="comeInSalon('${doc.id}')"
          >
            Come In Salon
          </button>

        </div>

      `;

    })

  })

</script>

</body>
</html>
